<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { padding: 20px; background: #1e293b; font-size: 24px; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
    button { padding: 10px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<header>CompTIA Certification Lab</header>

<div class="container">
  <h2 id="sectionTitle">Select a Section</h2>

  <div id="home">
    <button onclick="selectSection('A+ Core 1')">A+ Core 1</button>
    <button onclick="selectSection('A+ Core 2')">A+ Core 2</button>
    <button onclick="selectSection('Network+')">Network+</button>
    <button onclick="selectSection('Security+')">Security+</button>
  </div>

  <div id="mode" style="display:none;">
    <h3 id="modeTitle"></h3>

    <p id="sectionLabel"></p>

    <button onclick="startMode('flashcard')">Flashcards</button><br>
    <button onclick="startMode('study')">Study</button><br>
    <button onclick="openQuizSetup()">Quiz</button><br>
    <button onclick="startMode('test')">Test</button><br><br>

    <button onclick="goHome()">Back</button>
  </div>

  <!-- STUDY / FLASHCARDS -->
  <div id="study" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <div class="card" onclick="flipCard()">
      <p id="cardText"></p>
    </div>
    <button onclick="nextCard()">Next</button>
  </div>

  <!-- QUIZ SETUP -->
  <div id="quizSetup" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <h3>Quiz Settings</h3>

    <div style="margin:10px;">
      <span>Questions (5–50)</span><br>
      <input type="range" min="5" max="50" value="10" onchange="updateQCount(this.value)">
      <span id="qCount">10</span>
    </div>

    <div style="margin:10px;">
      <span>Timer (5–60 minutes)</span><br>
      <input type="range" min="5" max="60" value="10" onchange="updateTimer(this.value)">
      <span id="timerVal">10</span>
      <br>
      <button onclick="toggleTimer()">Toggle Timer</button>
      <span id="timerStatus">ON</span>
    </div>

    <div style="margin:10px;">
      <span>Instant Feedback?</span>
      <button onclick="toggleFeedback()">Toggle</button>
      <span id="feedbackIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;margin-left:10px;"></span>
      <span id="feedbackStatus">ON</span>
    </div>

    <br>
    <button onclick="startQuiz()">Begin Quiz</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <div class="card">
      <p id="questionText"></p>
    </div>
    <div id="answers"></div>
    <p id="result"></p>
    <p id="score"></p>
  </div>
</div>

<script>
const flashcards = {
  "Network+": [ {q: "What port does SSH use?", a: "22"} ],
  "Security+": [ {q: "CIA triad?", a: "Confidentiality, Integrity, Availability"} ],
  "A+ Core 1": [],
  "A+ Core 2": []
};

const quizData = {
  "Network+": [ {q: "What port does SSH use?", options: ["21","22","80","443"], correct: "22"} ],
  "Security+": [ {q: "CIA triad stands for?", options: ["Confidentiality Integrity Availability","Wrong","No","None"], correct: "Confidentiality Integrity Availability"} ],
  "A+ Core 1": [],
  "A+ Core 2": []
};

let currentSection = "";
let currentIndex = 0;
let score = 0;
let totalQuestions = 10;
let timer = 0;
let timerInterval = null;
let feedbackOn = true;
let timerEnabled = true;
let flipped = false;

function selectSection(section) {
  currentSection = section;
  document.getElementById("home").style.display = "none";
  document.getElementById("mode").style.display = "block";
  document.getElementById("modeTitle").innerText = "Section: " + section;
  document.getElementById("sectionTitle").style.display = "none";
}

function startMode(mode) {
  document.getElementById("mode").style.display = "none";

  if (mode === 'flashcard' || mode === 'study') {
    document.getElementById("study").style.display = "block";
    currentIndex = 0;
    flipped = false;
    showCard();
  }

  if (mode === 'test') {
    document.getElementById("quiz").style.display = "block";
    currentIndex = 0;
    score = 0;
    loadQuestion();
  }
}

function openQuizSetup() {
  document.getElementById("mode").style.display = "none";
  document.getElementById("quizSetup").style.display = "block";
}

function updateQCount(val) {
  totalQuestions = val;
  document.getElementById("qCount").innerText = val;
}

function updateTimer(val) {
  timer = val * 60;
  document.getElementById("timerVal").innerText = val;
}

function toggleTimer() {
  timerEnabled = !timerEnabled;
  document.getElementById("timerStatus").innerText = timerEnabled ? "ON" : "OFF";
}

function toggleFeedback() {
  feedbackOn = !feedbackOn;
  document.getElementById("feedbackStatus").innerText = feedbackOn ? "ON" : "OFF";
  const indicator = document.getElementById("feedbackIndicator");
  indicator.style.background = feedbackOn ? "green" : "red";
}

function startQuiz() {
  document.getElementById("quizSetup").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  currentIndex = 0;
  score = 0;
  startTimer();
  loadQuestion();
}

function startTimer() {
  if (!timerEnabled) return;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (timer <= 0) {
      clearInterval(timerInterval);
      endQuiz();
      return;
    }
    timer--;
    document.getElementById("score").innerText = "Time Left: " + Math.floor(timer/60) + ":" + (timer%60).toString().padStart(2,'0');
  }, 1000);
}
    timer--;
    document.getElementById("score").innerText = "Time Left: " + Math.floor(timer/60) + ":" + (timer%60).toString().padStart(2,'0');
  }, 1000);
}

function endQuiz() {
  document.getElementById("questionText").innerText = "Time's up";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("score").innerText = "Final Score: " + score;
}

function loadQuestion() {
  const data = quizData[currentSection];
  if (!data || currentIndex >= totalQuestions || currentIndex >= data.length) {
    document.getElementById("questionText").innerText = "Quiz finished";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("score").innerText = "Score: " + score;
    return;
  }

  const q = data[currentIndex];
  document.getElementById("questionText").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(answer) {
  const correct = quizData[currentSection][currentIndex].correct;
  if (answer === correct) {
    score++;
    if (feedbackOn) document.getElementById("result").innerText = "Correct";
  } else {
    if (feedbackOn) document.getElementById("result").innerText = "Incorrect";
  }

  setTimeout(() => {
    document.getElementById("result").innerText = "";
    currentIndex++;
    loadQuestion();
  }, feedbackOn ? 1000 : 0);
}

function showCard() {
  const cards = flashcards[currentSection];
  if (!cards || cards.length === 0) {
    document.getElementById("cardText").innerText = "No flashcards";
    return;
  }
  document.getElementById("cardText").innerText = cards[currentIndex].q;
}

function flipCard() {
  const cards = flashcards[currentSection];
  if (!cards || cards.length === 0) return;
  const text = document.getElementById("cardText");
  if (!flipped) {
    text.innerText = cards[currentIndex].a;
    flipped = true;
  } else {
    text.innerText = cards[currentIndex].q;
    flipped = false;
  }
}

function nextCard() {
  const cards = flashcards[currentSection];
  if (!cards || cards.length === 0) return;
  currentIndex = (currentIndex + 1) % cards.length;
  showCard();
}

function backToModes() {
  document.getElementById("study").style.display = "none";
  document.getElementById("quiz").style.display = "none";
  document.getElementById("quizSetup").style.display = "none";
  document.getElementById("mode").style.display = "block";
}

function goHome() {
  document.getElementById("mode").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("sectionTitle").style.display = "block";
}
</script>

</body>
</html>
