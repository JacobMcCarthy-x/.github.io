<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1e293b; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    button { padding: 10px 15px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
    .row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .correct { border:2px solid green; }
    .incorrect { border:2px solid red; }

    .stats-panel {
      position: fixed;
      right: 0;
      top: 70px;
      width: 260px;
      background: #111827;
      border-left: 2px solid #374151;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <button onclick="goHome()" style="background:none;border:none;color:white;font-size:20px;">
    CompTIA Certification Lab
  </button>

  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="toggleStatsBar()">Stats</button>
  </div>
</header>

<div id="statsBar" class="stats-panel" style="display:none;">
  <h4>Stats</h4>
  <p id="statAnswers"></p>
  <p id="statCorrect"></p>
  <p id="statPercent"></p>
</div>

<div class="container">

<h2 id="sectionTitle">Dashboard</h2>

<!-- STEP 1: CERTIFICATION -->
<div id="home">
  <h3>Select Certification</h3>
  <div class="row">
    <button onclick="selectCert('A1')">A+ Core 1</button>
    <button onclick="selectCert('A2')">A+ Core 2</button>
    <button onclick="selectCert('NET')">Network+</button>
    <button onclick="selectCert('SEC')">Security+</button>
  </div>
</div>

<!-- STEP 2: MODE -->
<div id="modeSelect" style="display:none;">
  <h3>Select Mode</h3>
  <div class="row">
    <button onclick="selectMode('quiz')">Quiz</button>
    <button onclick="selectMode('test')">Test</button>
    <button onclick="selectMode('flashcards')">Flashcards</button>
    <button onclick="selectMode('study')">Study</button>
  </div>
</div>

<!-- STEP 3: SECTION -->
<div id="sectionSelect" style="display:none;">
  <h3>Select Section</h3>
  <div id="sectionButtons" class="row"></div>
</div>

<!-- STEP 3: SETTINGS -->
<div id="quizSetup" style="display:none;">
  <h3>Quiz Settings</h3>

  Questions<br>
  <input type="range" min="5" max="50" value="10" oninput="updateQCount(this.value)">
  <span id="qCount">10</span><br><br>

  Timer<br>
  <input type="range" min="5" max="60" value="10" oninput="updateTimer(this.value)">
  <span id="timerVal">10</span>
  <button onclick="toggleTimer()">Toggle</button>
  <span id="timerIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;"></span>
  <span id="timerStatus">ON</span><br><br>

  <button onclick="startQuiz()">Begin Quiz</button>
</div>

<!-- STEP 4: QUIZ -->
<div id="quiz" style="display:none;">
  <p id="progressDisplay"></p>
  <p id="timerDisplay"></p>

  <div class="card">
    <p id="questionText"></p>
  </div>

  <div id="answers"></div>
</div>

<!-- STEP 5: RESULTS -->
<div id="review" style="display:none;">
  <h3>Results</h3>
  <div id="reviewList"></div>
  <button onclick="goHome()">Back to Home</button>
</div>

</div>

<script src="A1QuizData.js"></script>
<script src="timer.js"></script>

<script>
let selectedCert = "";
let selectedMode = "";
let selectedSection = "";
let shuffledQuestions = [];
let currentIndex = 0;
let score = 0;
let totalQuestions = 10;
let incorrectAnswers = [];

function selectCert(cert){
  selectedCert = cert;

  document.getElementById("home").style.display = "none";
  document.getElementById("sectionTitle").style.display = "none";
  document.getElementById("modeSelect").style.display = "block";
}

function loadSections(){
  const container = document.getElementById("sectionButtons");
  container.innerHTML = "";

  let data = A1QuizData;

  Object.keys(data).forEach(section => {
    const btn = document.createElement("button");
    btn.innerText = section;
    btn.onclick = () => selectSection(section);
    container.appendChild(btn);
  });

  const allBtn = document.createElement("button");
  allBtn.innerText = "All Sections";
  allBtn.onclick = () => selectSection("ALL");
  container.appendChild(allBtn);
}

function selectMode(mode){
  selectedMode = mode;

  document.getElementById("modeSelect").style.display = "none";
  document.getElementById("sectionSelect").style.display = "block";

  loadSections();
}

function selectSection(section){
  selectedSection = section;

  document.getElementById("sectionSelect").style.display = "none";
  document.getElementById("quizSetup").style.display = "block";
}

function goHome(){
  document.getElementById("home").style.display = "block";
  document.getElementById("modeSelect").style.display = "none";
  document.getElementById("sectionSelect").style.display = "none";
  document.getElementById("quizSetup").style.display = "none";
  document.getElementById("quiz").style.display = "none";
  document.getElementById("review").style.display = "none";
  document.getElementById("sectionTitle").style.display = "block";
}

function updateQCount(v){
  totalQuestions = parseInt(v);
  document.getElementById("qCount").innerText = v;
}

function startQuiz(){
  document.getElementById("quizSetup").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  currentIndex = 0;
  score = 0;
  incorrectAnswers = [];

  let data = A1QuizData;

  if(selectedSection === "ALL"){
    let all = [];
    Object.values(data).forEach(arr => all = all.concat(arr));
    shuffledQuestions = all.sort(() => Math.random() - 0.5);
  } else {
    shuffledQuestions = [...data[selectedSection]].sort(() => Math.random() - 0.5);
  }

  startTimer();
  loadQuestion();
}

function loadQuestion(){
  if(currentIndex >= totalQuestions || currentIndex >= shuffledQuestions.length){
    endQuiz();
    return;
  }

  const q = shuffledQuestions[currentIndex];

  document.getElementById("progressDisplay").innerText =
    `Question ${currentIndex+1} of ${totalQuestions}`;

  document.getElementById("questionText").innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.options.sort(() => Math.random() - 0.5).forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    answers.appendChild(btn);
  });
}

function checkAnswer(btn, ans, q){
  document.querySelectorAll("#answers button").forEach(b => b.disabled = true);

  if(ans === q.correct){
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("incorrect");
    document.querySelectorAll("#answers button").forEach(b => {
      if(b.innerText === q.correct) b.classList.add("correct");
    });

    incorrectAnswers.push({question:q, selected:ans, index: currentIndex});
  }

  setTimeout(() => {
    currentIndex++;
    loadQuestion();
  }, 1000);
}

function endQuiz(){
  clearInterval(timerInterval);

  document.getElementById("quiz").style.display = "none";
  document.getElementById("review").style.display = "block";

  const total = Math.min(totalQuestions, shuffledQuestions.length);
  const percent = ((score / total) * 100).toFixed(1);

  const review = document.getElementById("reviewList");
  review.innerHTML = `<p>Score: ${score}/${total} (${percent}%)</p>`;

  incorrectAnswers.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    let html = `<p><strong>Question ${item.index + 1}:</strong> ${item.question.q}</p>`;

    item.question.options.forEach(opt => {
      if(opt === item.question.correct){
        html += `<div class='correct'>${opt}</div>`;
      } else if(opt === item.selected){
        html += `<div class='incorrect'>${opt}</div>`;
      } else {
        html += `<div>${opt}</div>`;
      }
    });

    div.innerHTML = html;
    review.appendChild(div);
  });
}

function toggleStatsBar(){
  const bar = document.getElementById("statsBar");
  bar.style.display = bar.style.display === "none" ? "block" : "none";
}

window.onload = goHome;
</script>

</body>
</html>
