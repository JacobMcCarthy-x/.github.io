<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { padding: 20px; background: #1e293b; font-size: 24px; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
    button { padding: 10px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<header>CompTIA Certification Lab</header>

<div class="container">
  <h2 id="sectionTitle">Select a Section</h2>

  <div id="home">
    <button onclick="selectSection('A+ Core 1')">A+ Core 1</button>
    <button onclick="selectSection('A+ Core 2')">A+ Core 2</button>
    <button onclick="selectSection('Network+')">Network+</button>
    <button onclick="selectSection('Security+')">Security+</button>
  </div>

  <div id="mode" style="display:none;">
    <h3 id="modeTitle"></h3>

    <button onclick="startMode('flashcard')">Flashcards</button><br>
    <button onclick="startMode('study')">Study</button><br>
    <button onclick="openQuizSetup()">Quiz</button><br>
    <button onclick="startMode('test')">Test</button><br><br>

    <button onclick="goHome()">Back</button>
  </div>

  <div id="study" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <div class="card" onclick="flipCard()">
      <p id="cardText"></p>
    </div>
    <button onclick="nextCard()">Next</button>
  </div>

  <div id="quizSetup" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <h3>Quiz Settings</h3>

    <div>
      Questions (5–50)<br>
      <input type="range" min="5" max="50" value="10" oninput="updateQCount(this.value)">
      <span id="qCount">10</span>
    </div>

    <div>
      Timer (5–60 minutes)<br>
      <input type="range" min="5" max="60" value="10" oninput="updateTimer(this.value)">
      <span id="timerVal">10</span><br>
      <button onclick="toggleTimer()">Toggle Timer</button>
      <span id="timerStatus">ON</span>
    </div>

    <div>
      Instant Feedback?
      <button onclick="toggleFeedback()">Toggle</button>
      <span id="feedbackIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;margin-left:10px;"></span>
      <span id="feedbackStatus">ON</span>
    </div>

    <br>
    <button onclick="startQuiz()">Begin Quiz</button>
  </div>

  <div id="quiz" style="display:none;">
    <button onclick="backToModes()">Back</button>
    <div class="card"><p id="questionText"></p></div>
    <div id="answers"></div>
    <p id="result"></p>
    <p id="score"></p>
  </div>
</div>

<script>
const quizData = {
  "Network+": [
    {q:"What port does SSH use?", options:["21","22","80","443"], correct:"22"}
  ],
  "Security+": [
    {q:"CIA triad stands for?", options:["Confidentiality Integrity Availability","Wrong","No","None"], correct:"Confidentiality Integrity Availability"}
  ],
  "A+ Core 1": [
    {q:"Which type of RAM is most commonly used in modern desktop computers?", options:["DDR4","SRAM","RDRAM","VRAM"], correct:"DDR4"},
    {q:"What does DDR stand for?", options:["Double Data Rate","Dual Data RAM","Dynamic Data Read","Direct Data Register"], correct:"Double Data Rate"},
    {q:"Which component converts AC power to DC power in a computer?", options:["Power Supply Unit","Motherboard","CPU","Transformer"], correct:"Power Supply Unit"},
    {q:"What is the purpose of a CPU heat sink?", options:["Increase processing speed","Dissipate heat","Store data","Regulate voltage"], correct:"Dissipate heat"},
    {q:"Which port does HTTP use?", options:["21","22","80","443"], correct:"80"},
    {q:"Which port is HTTPS?", options:["80","110","443","25"], correct:"443"},
    {q:"Which port is SSH?", options:["21","22","23","25"], correct:"22"},
    {q:"Which port is DNS?", options:["25","53","80","443"], correct:"53"},
    {q:"A technician installs new RAM and system beeps. Likely cause?", options:["Faulty PSU","Improperly seated RAM","Corrupt OS","Overheating CPU"], correct:"Improperly seated RAM"},
    {q:"A system shuts down under load. Check first?", options:["Hard drive","CPU temperature","Network","BIOS"], correct:"CPU temperature"},
    {q:"RAID level with striping + parity?", options:["RAID 0","RAID 1","RAID 5","RAID 10"], correct:"RAID 5"},
    {q:"ECC memory purpose?", options:["Speed","Latency","Error correction","Graphics"], correct:"Error correction"},
    {q:"Phone can't connect cellular but WiFi works?", options:["Bad SIM","Dead battery","OS","Bluetooth"], correct:"Bad SIM"},
    {q:"Fingerprint login type?", options:["Encryption","Biometrics","MFA","Token"], correct:"Biometrics"},
    {q:"Share internet via phone?", options:["NFC","Tethering","VPN","AirDrop"], correct:"Tethering"},
    {q:"Cloud owned by third party?", options:["Private","Public","Hybrid","Community"], correct:"Public"}
  ],
  "A+ Core 2": []
};

let currentSection="";
let shuffledQuestions=[];
let currentIndex=0;
let score=0;
let totalQuestions=10;
let timer=600;
let timerInterval=null;
let timerEnabled=true;
let feedbackOn=true;

function selectSection(section){
  currentSection=section;
  document.getElementById("home").style.display="none";
  document.getElementById("mode").style.display="block";
  document.getElementById("modeTitle").innerText="Section: "+section;
  document.getElementById("sectionTitle").style.display="none";
}

function startMode(mode){
  document.getElementById("mode").style.display="none";
}

function openQuizSetup(){
  document.getElementById("mode").style.display="none";
  document.getElementById("quizSetup").style.display="block";
}

function updateQCount(val){totalQuestions=parseInt(val);document.getElementById("qCount").innerText=val;}
function updateTimer(val){timer=parseInt(val)*60;document.getElementById("timerVal").innerText=val;}
function toggleTimer(){timerEnabled=!timerEnabled;document.getElementById("timerStatus").innerText=timerEnabled?"ON":"OFF";}
function toggleFeedback(){feedbackOn=!feedbackOn;document.getElementById("feedbackStatus").innerText=feedbackOn?"ON":"OFF";document.getElementById("feedbackIndicator").style.background=feedbackOn?"green":"red";}

function startQuiz(){
  document.getElementById("quizSetup").style.display="none";
  document.getElementById("quiz").style.display="block";
  currentIndex=0;score=0;
  shuffledQuestions=shuffle([...quizData[currentSection]]);
  startTimer();loadQuestion();
}

function startTimer(){
  clearInterval(timerInterval);
  if(!timerEnabled) return;
  timerInterval=setInterval(()=>{
    if(timer<=0){clearInterval(timerInterval);endQuiz();return;}
    timer--;
    document.getElementById("score").innerText="Time Left: "+Math.floor(timer/60)+":"+(timer%60).toString().padStart(2,'0');
  },1000);
}

function loadQuestion(){
  if(currentIndex>=totalQuestions||currentIndex>=shuffledQuestions.length){endQuiz();return;}
  const q=shuffledQuestions[currentIndex];
  document.getElementById("questionText").innerText=q.q;
  const answers=document.getElementById("answers");answers.innerHTML="";
  shuffle([...q.options]).forEach(opt=>{
    const b=document.createElement("button");b.innerText=opt;b.onclick=()=>checkAnswer(opt);answers.appendChild(b);
  });
}

function checkAnswer(a){
  if(a===shuffledQuestions[currentIndex].correct){score++;if(feedbackOn)document.getElementById("result").innerText="Correct";}
  else if(feedbackOn)document.getElementById("result").innerText="Incorrect";
  setTimeout(()=>{document.getElementById("result").innerText="";currentIndex++;loadQuestion();},feedbackOn?800:0);
}

function endQuiz(){
  const total=Math.min(totalQuestions,shuffledQuestions.length);
  const percent=total?((score/total)*100).toFixed(1):0;
  document.getElementById("questionText").innerText="Finished";
  document.getElementById("answers").innerHTML="";
  document.getElementById("score").innerText=`Score: ${score}/${total} (${percent}%)`;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function backToModes(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("quizSetup").style.display="none";
  document.getElementById("mode").style.display="block";
}

function goHome(){
  document.getElementById("mode").style.display="none";
  document.getElementById("home").style.display="block";
  document.getElementById("sectionTitle").style.display="block";
}
</script>

</body>
</html>
