<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Study</title>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; margin:0; }
    header { display:flex; justify-content:space-between; padding:20px; background:#1e293b; }
    .container { padding:20px; }
    button { margin:5px; padding:10px 15px; border:none; border-radius:6px; background:#3b82f6; color:white; cursor:pointer; }
    .correct { border:2px solid green; }
    .incorrect { border:2px solid red; }
  </style>
</head>

<body>

<header>
  <button onclick="goHome()">Home</button>
</header>

<div class="container">

<h2 id="title">Dashboard</h2>

<!-- STEP 1: CERT -->
<div id="home">
  <h3>Select Certification</h3>
  <button onclick="selectCert()">A+ Core 1</button>
</div>

<!-- STEP 2: MODE -->
<div id="mode" style="display:none;">
  <h3>Select Mode</h3>
  <button onclick="selectMode()">Quiz</button>
</div>

<!-- STEP 3: SECTION -->
<div id="section" style="display:none;">
  <h3>Select Section</h3>

  <label><input type="checkbox" value="Mobile Devices (13%)"> Mobile</label><br>
  <label><input type="checkbox" value="Hardware (25%)"> Hardware</label><br>

  <br>
  <button onclick="confirmSections()">Start Quiz</button>
</div>

<!-- STEP 4: QUIZ -->
<div id="quiz" style="display:none;">
  <p id="progress"></p>
  <p id="question"></p>
  <div id="answers"></div>
</div>

<!-- STEP 5: RESULT -->
<div id="result" style="display:none;">
  <h3>Results</h3>
  <p id="score"></p>
  <button onclick="goHome()">Back</button>
</div>

</div>

<script>
const data = {
  "Mobile Devices (13%)": [
    {q:"What is SIM?", options:["Storage","Network ID"], correct:"Network ID"}
  ],
  "Hardware (25%)": [
    {q:"What is RAM?", options:["Memory","CPU"], correct:"Memory"}
  ]
};

let selectedSections = [];
let questions = [];
let index = 0;
let score = 0;

/* NAV */
function goHome(){
  home.style.display="block";
  mode.style.display="none";
  section.style.display="none";
  quiz.style.display="none";
  result.style.display="none";
}

/* FLOW */
function selectCert(){
  home.style.display="none";
  mode.style.display="block";
}

function selectMode(){
  mode.style.display="none";
  section.style.display="block";
}

function confirmSections(){
  selectedSections = [];

  document.querySelectorAll("#section input:checked")
    .forEach(cb => selectedSections.push(cb.value));

  if(selectedSections.length === 0){
    alert("Select at least one");
    return;
  }

  questions = [];
  selectedSections.forEach(sec => {
    questions = questions.concat(data[sec]);
  });

  index = 0;
  score = 0;

  section.style.display="none";
  quiz.style.display="block";

  loadQuestion();
}

/* QUIZ */
function loadQuestion(){
  if(index >= questions.length){
    endQuiz();
    return;
  }

  const q = questions[index];

  progress.innerText = `Question ${index+1}`;
  question.innerText = q.q;

  answers.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    answers.appendChild(btn);
  });
}

function checkAnswer(btn, ans, q){
  document.querySelectorAll("#answers button")
    .forEach(b => b.disabled = true);

  if(ans === q.correct){
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("incorrect");

    document.querySelectorAll("#answers button").forEach(b=>{
      if(b.innerText === q.correct) b.classList.add("correct");
    });
  }

  setTimeout(()=>{
    index++;
    loadQuestion();
  },1000);
}

/* END */
function endQuiz(){
  quiz.style.display="none";
  result.style.display="block";
  score.innerText = `Score: ${score}/${questions.length}`;
}

window.onload = goHome;
</script>

</body>
</html>
