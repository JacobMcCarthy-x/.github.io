<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { padding: 20px; background: #1e293b; font-size: 24px; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    button { padding: 10px 15px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
    .row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .correct { border:2px solid green; }
    .incorrect { border:2px solid red; }

/* Stats panel */
.stats-panel {
  position: fixed;
  right: 0;
  top: 70px;
  width: 260px;
  background: #111827;
  border-left: 2px solid #374151;
  padding: 15px;
  text-align: left;
  box-shadow: -5px 0 10px rgba(0,0,0,0.5);
}

.stats-panel h4 {
  margin-top: 0;
}

.stats-panel p {
  margin: 6px 0;
  font-size: 14px;
}
  </style>
</head>
<body>

<header style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1e293b;">
  <div>CompTIA Certification Lab</div>
  <button onclick="toggleStatsBar()">Stats</button>
</header>

<div id="statsBar" class="stats-panel" style="display:none;">
  <h4>Stats</h4>
  <p id="statAnswers"></p>
  <p id="statCorrect"></p>
  <p id="statPercent"></p>
  <hr style="border-color:#374151;">
  <p id="statQuizzes"></p>
  <p id="statAced"></p>
  <p id="statPassed"></p>
  <br>
  <button onclick="showResetConfirm()">Reset</button>
  <div id="resetConfirm" style="display:none; margin-top:10px;">
    <p>Are you sure?</p>
    <button onclick="confirmReset()">Yes</button>
    <button onclick="cancelReset()">No</button>
  </div>
</div>

<div class="container">

<h2 id="sectionTitle">Select a Section</h2>

<div id="home">
  <button onclick="selectSection('A+ Core 1')">A+ Core 1</button>
</div>

<div id="mode" style="display:none;">
  <h3 id="modeTitle"></h3>

  <div class="row">
    <button onclick="startMode('flashcard')">Flashcards</button>
    <button onclick="startMode('study')">Study</button>
    <button onclick="openQuizSetup()">Quiz</button>
    <button onclick="startMode('test')">Test</button>
  </div>

</div>

  <br>
  <button onclick="goHome()">Back</button>
</div>

<div id="quizSetup" style="display:none;">
  
  <h3>Quiz Settings</h3>

  Questions (5–50)<br>
  <input type="range" min="5" max="50" value="10" oninput="updateQCount(this.value)">
  <span id="qCount">10</span><br><br>

  Timer (5–60 min)<br>
  <input type="range" min="5" max="60" value="10" oninput="updateTimer(this.value)">
  <span id="timerVal">10</span>
  <button onclick="toggleTimer()">Toggle</button>
  <span id="timerIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;margin-left:5px;"></span>
  <span id="timerStatus">ON</span><br><br>

  Feedback?
  <button onclick="toggleFeedback()">Toggle</button>
  <span id="feedbackIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;margin-left:5px;"></span>
  <span id="feedbackStatus">ON</span>

  <br><br>
  <button onclick="startQuiz()">Begin Quiz</button>
</div>

<div id="quiz" style="display:none;">
  
  <p id="timerDisplay"></p>
  <div class="card"><p id="questionText"></p></div>
  <div id="answers"></div>
</div>

<div id="review" style="display:none;">
  <h3>Review Incorrect Answers</h3>
  <div id="reviewList"></div>
  <button onclick="goHome()" id="reviewHomeBtn">Back to Home</button>

  <h3>Review Incorrect Answers</h3>
  <div id="reviewList"></div>
  
  <button onclick="goHome()" id="reviewHomeBtn">Back to Home</button>
</div>

<div id="stats" style="display:none;">
  <h3>Personal Statistics</h3>
  <p id="statTotal"></p>
  <p id="statCorrect"></p>
  <p id="statAccuracy"></p>
  
</div>
  
</div>

</div>

<script src="A1QuizData.js"></script>
<script>
window.onload = () => {
  goHome();
};
</script>
<script>

// ELEMENT REFERENCES
const home = document.getElementById("home");
const mode = document.getElementById("mode");
const quizSetup = document.getElementById("quizSetup");
const quiz = document.getElementById("quiz");
const review = document.getElementById("review");
const statsBar = document.getElementById("statsBar");

const modeTitle = document.getElementById("modeTitle");
const sectionTitle = document.getElementById("sectionTitle");
const questionText = document.getElementById("questionText");
const answers = document.getElementById("answers");
const reviewList = document.getElementById("reviewList");
const timerDisplay = document.getElementById("timerDisplay");

const qCount = document.getElementById("qCount");
const timerVal = document.getElementById("timerVal");
const timerStatus = document.getElementById("timerStatus");
const timerIndicator = document.getElementById("timerIndicator");
const feedbackStatus = document.getElementById("feedbackStatus");
const feedbackIndicator = document.getElementById("feedbackIndicator");

// STATE
let currentSection="";
let shuffledQuestions=[];
let currentIndex=0;
let score=0;
let totalQuestions=10;
let incorrectAnswers=[];

let timer=600;
let timerInterval;
let timerEnabled=true;
let feedbackOn=true;

let totalAnswered=0;
let totalCorrect=0;
let quizzesCompleted=0;
let quizzesAced=0;
let quizzesPassed=0;

// NAVIGATION
function selectSection(section){
  currentSection=section;
  home.style.display="none";
  mode.style.display="block";
  modeTitle.innerText="Section: "+section;
  sectionTitle.style.display="none";
}

function openQuizSetup(){
  mode.style.display="none";
  quizSetup.style.display="block";
}

function goHome(){
  review.style.display="none";
  quiz.style.display="none";
  quizSetup.style.display="none";
  mode.style.display="none";
  home.style.display="block";
  sectionTitle.style.display="block";
}

function updateQCount(v){ totalQuestions=parseInt(v); qCount.innerText=v; }
function updateTimer(v){ timer=parseInt(v)*60; timerVal.innerText=v; }

function toggleTimer(){
  timerEnabled=!timerEnabled;
  timerStatus.innerText=timerEnabled?"ON":"OFF";
  timerIndicator.style.background=timerEnabled?"green":"red";
}

function toggleFeedback(){
  feedbackOn=!feedbackOn;
  feedbackStatus.innerText=feedbackOn?"ON":"OFF";
  feedbackIndicator.style.background=feedbackOn?"green":"red";
}

function startQuiz(){
  quizSetup.style.display="none";
  quiz.style.display="block";

  currentIndex=0;
  score=0;
  incorrectAnswers=[];

  shuffledQuestions=shuffle([...A1QuizData]);

  startTimer();
  loadQuestion();
}

function startTimer(){
  clearInterval(timerInterval);
  if(!timerEnabled) return;

  timerInterval=setInterval(()=>{
    if(timer<=0){ clearInterval(timerInterval); endQuiz(); return; }
    timer--;
    timerDisplay.innerText="Time: "+Math.floor(timer/60)+":"+(timer%60).toString().padStart(2,'0');
  },1000);
}

function loadQuestion(){
  if(currentIndex>=totalQuestions||currentIndex>=shuffledQuestions.length){ endQuiz(); return; }

  const q=shuffledQuestions[currentIndex];
  questionText.innerText=q.q;

  answers.innerHTML="";

  shuffle([...q.options]).forEach(opt=>{
    const b=document.createElement("button");
    b.innerText=opt;
    b.onclick=()=>checkAnswer(opt,q);
    answers.appendChild(b);
  });
}

function checkAnswer(ans,q){
  totalAnswered++;

  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(btn => {
    btn.disabled = true;

    if(btn.innerText === q.correct){
      btn.classList.add("correct");
    }

    if(btn.innerText === ans && ans !== q.correct){
      btn.classList.add("incorrect");
    }
  });

  if(ans === q.correct){
    score++;
    totalCorrect++;
  } else {
    incorrectAnswers.push({question:q,selected:ans});
  }

  setTimeout(() => {
    currentIndex++;
    loadQuestion();
  }, 1200);
}

function endQuiz(){
  clearInterval(timerInterval);

  quiz.style.display="none";

  const total=Math.min(totalQuestions,shuffledQuestions.length);
  const percent=((score/total)*100).toFixed(1);

  quizzesCompleted++;
  if(percent==100) quizzesAced++;
  if(percent>=75) quizzesPassed++;

  review.style.display="block";

  reviewList.innerHTML=`<p>Score: ${score}/${total} (${percent}%)</p>`;

  incorrectAnswers.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";

    let html=`<p>${item.question.q}</p>`;

    item.question.options.forEach(opt=>{
      if(opt===item.question.correct) html+=`<div class='correct'>${opt}</div>`;
      else if(opt===item.selected) html+=`<div class='incorrect'>${opt}</div>`;
      else html+=`<div>${opt}</div>`;
    });

    div.innerHTML=html;
    reviewList.appendChild(div);
  });
}

function toggleStatsBar(){
  statsBar.style.display = statsBar.style.display === "none" ? "block" : "none";

  const accuracy = totalAnswered ? ((totalCorrect/totalAnswered)*100).toFixed(1) : 0;

  document.getElementById("statAnswers").innerText = "Answers Completed: " + totalAnswered;
  document.getElementById("statCorrect").innerText = "Answers Correct: " + totalCorrect;
  document.getElementById("statPercent").innerText = "Correct Answer Percentage: " + accuracy + "%";
  document.getElementById("statQuizzes").innerText = "Quizzes Completed: " + quizzesCompleted;
  document.getElementById("statAced").innerText = "Quizzes Aced: " + quizzesAced;
  document.getElementById("statPassed").innerText = "Quizzes Passed (75%): " + quizzesPassed;
}

function showResetConfirm(){
  document.getElementById("resetConfirm").style.display = "block";
}

function cancelReset(){
  document.getElementById("resetConfirm").style.display = "none";
}

function confirmReset(){
  totalAnswered = 0;
  totalCorrect = 0;
  quizzesCompleted = 0;
  quizzesAced = 0;
  quizzesPassed = 0;

  document.getElementById("resetConfirm").style.display = "none";

  toggleStatsBar();
  toggleStatsBar();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

</script>

</body>
</html>
