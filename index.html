<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>

  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1e293b; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    button { padding: 10px 15px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
    .row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .correct { border:2px solid green; }
    .incorrect { border:2px solid red; }

    .stats-panel {
      position: fixed;
      right: 0;
      top: 70px;
      width: 260px;
      background: #111827;
      border-left: 2px solid #374151;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <button onclick="goHome()" style="background:none;border:none;color:white;font-size:20px;">
    CompTIA Certification Lab
  </button>

  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="toggleStatsBar()">Stats</button>
  </div>
</header>

<div id="statsBar" class="stats-panel" style="display:none;">
  <h4>Stats</h4>
  <p id="statAnswers"></p>
  <p id="statCorrect"></p>
  <p id="statPercent"></p>
</div>

<div class="container">

<h2 id="sectionTitle">Dashboard</h2>

<div id="home">
  <h3>Select Certification</h3>
  <div class="row">
    <button onclick="selectCert('A1')">A+ Core 1</button>
    <button onclick="selectCert('A2')">A+ Core 2</button>
    <button onclick="selectCert('NET')">Network+</button>
    <button onclick="selectCert('SEC')">Security+</button>
  </div>
</div>

<div id="modeSelect" style="display:none;">
  <h3>Select Mode</h3>
  <div class="row">
    <button onclick="selectMode('quiz')">Quiz</button>
    <button onclick="selectMode('test')">Test</button>
    <button onclick="selectMode('flashcards')">Flashcards</button>
    <button onclick="selectMode('study')">Study</button>
  </div>
</div>

<div id="sectionSelect" style="display:none;">
  <h3>Select Sections</h3>
  <div id="sectionButtons"></div>
  <br>
  <button onclick="confirmSections()">Proceed</button>
</div>

<div id="quizSetup" style="display:none;">
  <h3>Quiz Settings</h3>

  Questions<br>
  <input type="range" min="5" max="50" value="10" oninput="updateQCount(this.value)">
  <span id="qCount">10</span><br><br>

  Timer<br>
  <input type="range" min="5" max="60" value="10" oninput="updateTimer(this.value)">
  <span id="timerVal">10</span>
  <button onclick="toggleTimer()">Toggle</button>
  <span id="timerIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;"></span>
  <span id="timerStatus">ON</span><br><br>

  <button onclick="startQuiz()">Begin Quiz</button>
</div>

<div id="quiz" style="display:none;">
  <p id="progressDisplay"></p>
  <p id="timerDisplay"></p>

  <div class="card">
    <p id="questionText"></p>
  </div>

  <div id="answers"></div>
</div>

<div id="review" style="display:none;">
  <h3>Results</h3>
  <div id="reviewList"></div>
  <button onclick="goHome()">Back to Home</button>
</div>

</div>

<script src="A1QuizData.js"></script>
<script src="timer.js"></script>

<script>
let selectedCert = "";
let selectedMode = "";
let selectedSections = [];
let shuffledQuestions = [];
let currentIndex = 0;
let score = 0;
let totalQuestions = 10;
let incorrectAnswers = [];

/* NAV */
function selectCert(cert){
  selectedCert = cert;
  home.style.display="none";
  sectionTitle.style.display="none";
  modeSelect.style.display="block";
}

function selectMode(mode){
  selectedMode = mode;
  modeSelect.style.display="none";
  sectionSelect.style.display="block";
  loadSections();
}

/* SECTION LOAD */
function loadSections(){
  const container = document.getElementById("sectionButtons");
  container.innerHTML = "";

  const data = A1QuizData;

  const allLabel = document.createElement("label");
  const allCheckbox = document.createElement("input");
  allCheckbox.type = "checkbox";
  allCheckbox.value = "ALL";

  allCheckbox.addEventListener("change", () => {
    container.querySelectorAll("input").forEach(cb => {
      if(cb !== allCheckbox) cb.checked = allCheckbox.checked;
    });
  });

  allLabel.appendChild(allCheckbox);
  allLabel.append(" All Sections");
  container.appendChild(allLabel);

  Object.keys(data).forEach(section => {
    const label = document.createElement("label");
    const checkbox = document.createElement("input");

    checkbox.type = "checkbox";
    checkbox.value = section;

    label.appendChild(checkbox);
    label.append(" " + section);

    container.appendChild(label);
  });
}

/* CONFIRM */
function confirmSections(){
  selectedSections = [];

  const allCheckbox = document.querySelector("#sectionButtons input[value='ALL']");
  const allChecked = allCheckbox && allCheckbox.checked;

  if(allChecked){
    selectedSections = Object.keys(A1QuizData);
  } else {
    document.querySelectorAll("#sectionButtons input:checked").forEach(cb => {
      if(cb.value !== "ALL") selectedSections.push(cb.value);
    });
  }

  if(selectedSections.length === 0){
    alert("Select at least one section");
    return;
  }

  sectionSelect.style.display="none";
  quizSetup.style.display="block";
}

/* HOME RESET */
function goHome(){
  home.style.display="block";
  modeSelect.style.display="none";
  sectionSelect.style.display="none";
  quizSetup.style.display="none";
  quiz.style.display="none";
  review.style.display="none";
  sectionTitle.style.display="block";
}

/* QUIZ */
function updateQCount(v){
  totalQuestions = parseInt(v);
  qCount.innerText = v;
}

function startQuiz(){
  quizSetup.style.display="none";
  quiz.style.display="block";

  currentIndex = 0;
  score = 0;
  incorrectAnswers = [];

  let all = [];
  selectedSections.forEach(section => {
    all = all.concat(A1QuizData[section]);
  });

  shuffledQuestions = all.sort(() => Math.random() - 0.5);

  startTimer();
  loadQuestion();
}

function loadQuestion(){
  if(currentIndex >= totalQuestions || currentIndex >= shuffledQuestions.length){
    endQuiz();
    return;
  }

  const q = shuffledQuestions[currentIndex];

  progressDisplay.innerText = `Question ${currentIndex+1} of ${totalQuestions}`;
  questionText.innerText = q.q;

  answers.innerHTML = "";

  q.options.sort(() => Math.random() - 0.5).forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(btn, opt, q);
    answers.appendChild(btn);
  });
}

function checkAnswer(btn, ans, q){
  document.querySelectorAll("#answers button").forEach(b => b.disabled = true);

  if(ans === q.correct){
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("incorrect");

    document.querySelectorAll("#answers button").forEach(b => {
      if(b.innerText === q.correct) b.classList.add("correct");
    });

    incorrectAnswers.push({question:q, selected:ans, index: currentIndex});
  }

  setTimeout(() => {
    currentIndex++;
    loadQuestion();
  }, 1000);
}

function endQuiz(){
  clearInterval(timerInterval);

  quiz.style.display="none";
  review.style.display="block";

  const total = Math.min(totalQuestions, shuffledQuestions.length);
  const percent = ((score / total) * 100).toFixed(1);

  reviewList.innerHTML = `<p>Score: ${score}/${total} (${percent}%)</p>`;
}

function toggleStatsBar(){
  statsBar.style.display = statsBar.style.display === "none" ? "block" : "none";
}

window.onload = goHome;
</script>

</body>
</html>
