<!DOCTYPE html>
<html>
<head>
  <title>CompTIA Certification Lab</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; margin: 0; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1e293b; }
    .container { padding: 20px; }
    .card { background: #1e293b; padding: 20px; margin: 20px auto; width: 320px; border-radius: 10px; }
    button { padding: 10px 15px; margin: 5px; border-radius: 6px; background: #3b82f6; color: white; border: none; cursor: pointer; }
    .row { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .correct { border:2px solid green; }
    .incorrect { border:2px solid red; }

    .stats-panel {
      position: fixed;
      right: 0;
      top: 70px;
      width: 260px;
      background: #111827;
      border-left: 2px solid #374151;
      padding: 15px;
    }
  </style>
</head>
<body>

<header>
  <button onclick="goHome()" style="background:none;border:none;color:white;font-size:20px;">
    CompTIA Certification Lab
  </button>
  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="toggleStatsBar()">Stats</button>
  </div>
</header>

<div id="statsBar" class="stats-panel" style="display:none;">
  <h4>Stats</h4>
  <p id="statAnswers"></p>
  <p id="statCorrect"></p>
  <p id="statPercent"></p>
</div>

<div class="container">

<h2 id="sectionTitle">Dashboard</h2>

<div id="home">
  <div class="row">
    <button onclick="openQuizSetup()">Quiz</button>
    <button onclick="startMode()">Test</button>
    <button onclick="startMode()">Flashcards</button>
    <button onclick="startMode()">Study</button>
  </div>
</div>

<div id="quizSetup" style="display:none;">
  <h3>Quiz Settings</h3>

  Questions<br>
  <input type="range" min="5" max="50" value="10" oninput="updateQCount(this.value)">
  <span id="qCount">10</span><br><br>

  Timer<br>
  <input type="range" min="5" max="60" value="10" oninput="updateTimer(this.value)">
  <span id="timerVal">10</span>
  <button onclick="toggleTimer()">Toggle</button>
  <span id="timerIndicator" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:green;"></span>
  <span id="timerStatus">ON</span><br><br>

  <button onclick="startQuiz()">Begin Quiz</button>
</div>

<div id="quiz" style="display:none;">
  <p id="progressDisplay"></p>
  <p id="timerDisplay"></p>
  <div class="card"><p id="questionText"></p></div>
  <div id="answers"></div>
</div>

<div id="review" style="display:none;">
  <h3>Results</h3>
  <div id="reviewList"></div>
  <button onclick="goHome()">Back to Home</button>
</div>

</div>

<script src="A1QuizData.js"></script>
<script src="timer.js"></script>
<script src="app.js"></script>

</body>
</html>
